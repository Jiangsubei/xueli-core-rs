# =============================================================================
# xueli-core 配置文件示例
# =============================================================================
# 复制为 config.toml 并填写实际值后使用。
# config.toml 包含敏感信息（api_key），已在 .gitignore 中排除。
# =============================================================================

# -----------------------------------------------------------------------------
# AI 模型配置
# -----------------------------------------------------------------------------
[model]
primary_model = "gpt-4o"           # 主要模型（用于 ReplyAgent 主回复）
light_model = "gpt-4o-mini"        # 轻量模型（用于 TimingGate / Planner / Rerank）
vision_model = "gpt-4o"            # VLM 视觉模型（可选）
api_base = "https://api.openai.com/v1"  # API 地址
api_key = ""                       # API Key（必填）
temperature = 0.7                  # 默认 temperature
max_tokens = 4096                  # 最大输出 token
context_window = 128000            # 上下文窗口（token）
timeout = 120                      # 请求超时（秒）
response_path = "choices.0.message.content"  # 响应 JSON path
max_concurrency = 5                # 最大并发请求数
max_retries = 3                    # 最大重试次数

# -----------------------------------------------------------------------------
# 回复行为配置
# -----------------------------------------------------------------------------
[reply]
group_cooldown_secs = 10.0         # 群聊冷却间隔（秒）
private_cooldown_secs = 3.0        # 私聊冷却间隔（秒）
max_context_messages = 50          # 上下文窗口最大消息数
max_reply_chars = 500              # 单次回复最大字符数

# -----------------------------------------------------------------------------
# 记忆系统配置
# -----------------------------------------------------------------------------
[memory]
db_path = "data/xueli_memory.db"   # SQLite 数据库路径
extraction_min_messages = 5        # 触发记忆提取的最小消息数
bm25_top_k = 10                    # BM25 检索返回数
vector_top_k = 5                   # 向量检索返回数

# -----------------------------------------------------------------------------
# Timing Gate 配置
# -----------------------------------------------------------------------------
[timing_gate]
default_proactive_probability = 0.3    # 默认主动回复概率
mention_reply_probability = 0.95       # 被 @ 时回复概率

# -----------------------------------------------------------------------------
# 会话配置
# -----------------------------------------------------------------------------
[session]
session_timeout_secs = 3600        # 会话超时（秒）
max_concurrent_messages = 10       # 每会话最大并发消息

# -----------------------------------------------------------------------------
# 表情系统配置
# -----------------------------------------------------------------------------
[emoji]
enabled = true                     # 是否启用表情系统
# db_path = "data/emoji.db"        # 表情数据库路径（可选）

# -----------------------------------------------------------------------------
# 主动分享配置
# -----------------------------------------------------------------------------
# -----------------------------------------------------------------------------
# 身份配置
# -----------------------------------------------------------------------------
[identity]
name = "雪梨"                       # 助手名称
alias = "小梨"                      # 助手别名

# -----------------------------------------------------------------------------
# 主动分享配置
# -----------------------------------------------------------------------------
[proactive_share]
enabled = false                    # 是否启用主动分享（默认关闭）
interval_secs = 3600               # 分享间隔（秒）